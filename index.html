<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スターカート</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #ffd9ec; }
  body { font-family: 'Segoe UI', 'Hiragino Maru Gothic ProN', 'Yu Gothic UI', sans-serif; }
  #app { position: fixed; inset: 0; }
  #app canvas { display: block; }
  #debug {
    position: fixed; top: 10px; left: 10px; z-index: 20;
    background: rgba(40, 24, 32, 0.6); color: #fff;
    font: 12px/1.6 Consolas, monospace; white-space: pre;
    padding: 8px 12px; border-radius: 10px; pointer-events: none;
  }
  #hud { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
  #vignette {
    position: fixed; inset: 0; z-index: 6; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 58%, rgba(35,15,30,0.30) 100%);
  }
  #centerMsg {
    position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
    z-index: 30; color: #fff; font-size: 64px; font-weight: 900;
    text-shadow: 0 3px 0 #d46a9a, 0 6px 14px rgba(0,0,0,.25);
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="vignette"></div>
<div id="hud"></div>
<div id="centerMsg"></div>
<div id="debug"></div>

<script src="lib/three.min.js"></script>
<script src="src/core/boot.js"></script>
<script src="src/core/config.js"></script>
<script src="src/core/materials.js"></script>
<script src="src/core/geo.js"></script>
<script src="src/core/utils.js"></script>
<script src="src/core/input.js"></script>
<script src="src/core/touch.js"></script>
<script src="src/core/audio.js"></script>
<script src="src/courses/course.js"></script>
<script src="src/courses/cookie_town.js"></script>
<script src="src/courses/choco_canyon.js"></script>
<script src="src/courses/sky_castle.js"></script>
<script src="src/physics/kart.js"></script>
<script src="src/chars/kart_style.js"></script>
<script src="src/chars/character_materials.js"></script>
<script src="src/chars/character_builder.js"></script>
<script src="src/chars/character_rig.js"></script>
<script src="src/chars/characters.js"></script>
<script src="src/items/items.js"></script>
<script src="src/fx/effects.js"></script>
<script src="src/race/ai.js"></script>
<script src="src/race/race.js"></script>
<script src="src/ui/hud.js"></script>
<script src="src/ui/screens.js"></script>
<script src="src/core/game.js"></script>
<script src="src/main.js"></script>
</body>
</html>
